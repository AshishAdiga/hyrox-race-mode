<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>RACE MODE — Hyrox Dublin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   DESIGN TOKENS — Race Mode
   Black/yellow built from race-bib and stopwatch material, not stock palette
   ============================================================================ */
:root {
  /* Surfaces */
  --ink:          #0a0a0b;
  --ink-2:        #111113;
  --surface:      #16161a;
  --surface-2:    #1d1d22;
  --surface-3:    #25252c;
  --line:         #2a2a31;
  --line-bright:  #38383f;

  /* Signature yellow — desaturated race-bib tone, not traffic-cone */
  --volt:         #f4d03f;
  --volt-deep:    #d4af1f;
  --volt-dim:     rgba(244,208,63,0.14);
  --volt-dim-2:   rgba(244,208,63,0.07);
  --volt-line:    rgba(244,208,63,0.35);
  --on-volt:      #14140c;

  /* Text */
  --paper:        #f5f3ed;
  --paper-dim:    #9a9aa2;
  --paper-faint:  #5c5c64;

  /* Status — used sparingly */
  --go:           #4ddb8f;
  --go-dim:       rgba(77,219,143,0.12);
  --warn:         #ff9f43;
  --warn-dim:     rgba(255,159,67,0.12);
  --stop:         #ff4d4d;
  --stop-dim:     rgba(255,77,77,0.12);
  --info:         #5ec8e0;
  --info-dim:     rgba(94,200,224,0.12);

  /* Phase identity colors — subtle, desaturated, never compete with volt */
  --p1: #6b8cce; --p1-dim: rgba(107,140,206,0.14);
  --p2: #4ddb8f; --p2-dim: rgba(77,219,143,0.14);
  --p3: #c879e0; --p3-dim: rgba(200,121,224,0.14);
  --p4: #ff6b6b; --p4-dim: rgba(255,107,107,0.14);

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }

body {
  background: var(--ink);
  color: var(--paper);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(circle at 15% 0%, rgba(244,208,63,0.05), transparent 45%),
    radial-gradient(circle at 100% 30%, rgba(244,208,63,0.03), transparent 40%);
}

::selection { background: var(--volt-dim); color: var(--volt); }

.num { font-family: 'JetBrains Mono', monospace; }
.display { font-family: 'Archivo Expanded', sans-serif; }

:focus-visible { outline: 2px solid var(--volt); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ============================================================================
   HEADER — Race bib week selector (the signature element)
   ============================================================================ */
.app-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: linear-gradient(180deg, var(--ink) 60%, rgba(10,10,11,0.97));
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}

.header-brand {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 0;
}
.brand-mark {
  display: flex;
  align-items: baseline;
  gap: 7px;
}
.brand-mark .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--volt);
  box-shadow: 0 0 8px rgba(244,208,63,0.6);
  flex-shrink: 0;
}
.brand-name {
  font-family: 'Archivo Expanded', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  color: var(--paper);
}
.brand-name .accent { color: var(--volt); }

.countdown-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--paper-dim);
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 4px 10px 4px 8px;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.countdown-chip .pulse {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--go);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* The Bib — race-number style week selector */
.bib-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px 14px;
}
.bib {
  position: relative;
  background: var(--surface);
  border: 1.5px solid var(--line-bright);
  border-radius: var(--r-md);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.bib::before {
  content: "";
  position: absolute;
  top: -1px; left: 14px; right: 14px;
  height: 2px;
  background: repeating-linear-gradient(90deg, var(--volt) 0 6px, transparent 6px 11px);
  opacity: 0.5;
}
.bib-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--paper-faint);
  text-transform: uppercase;
  writing-mode: horizontal-tb;
}
.bib-num-wrap { position: relative; }
.bib-number {
  font-family: 'Archivo Expanded', sans-serif;
  font-weight: 800;
  font-size: 34px;
  line-height: 1;
  color: var(--volt);
  letter-spacing: -1px;
  background: transparent;
  border: none;
  width: 64px;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}
.bib-number::-webkit-outer-spin-button,
.bib-number::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.bib-of {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--paper-faint);
  margin-top: 2px;
}

.bib-nav { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.bib-nav-btn {
  width: 30px; height: 22px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--paper-dim);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.bib-nav-btn:active { background: var(--volt-dim); border-color: var(--volt-line); color: var(--volt); }

.phase-strip { flex: 1; min-width: 0; }
.phase-strip-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--paper-faint);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.phase-strip-name {
  font-family: 'Archivo Expanded', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}
.phase-bar-track {
  height: 5px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.phase-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
}

/* Day rail */
.day-rail {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 18px 12px;
}
.day-rail::-webkit-scrollbar { display: none; }
.day-chip {
  flex-shrink: 0;
  padding: 7px 13px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--paper-dim);
  background: var(--surface);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  text-transform: uppercase;
}
.day-chip .tag {
  display: block;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.3px;
  margin-top: 1px;
  opacity: 0.7;
}
.day-chip.active {
  background: var(--volt);
  border-color: var(--volt);
  color: var(--on-volt);
}
.day-chip.active .tag { color: var(--on-volt); opacity: 0.65; }
.day-chip.is-rest { opacity: 0.55; }

/* ============================================================================
   LAYOUT
   ============================================================================ */
.view { display: none; padding-bottom: calc(84px + var(--safe-bottom)); }
.view.active { display: block; animation: fade-in 0.25s ease; }
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.content { padding: 16px 16px 0; max-width: 600px; margin: 0 auto; }

/* ============================================================================
   BANNERS
   ============================================================================ */
.banner {
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin-bottom: 14px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 1px solid;
}
.banner-deload { background: linear-gradient(135deg, var(--warn-dim), rgba(255,159,67,0.04)); border-color: rgba(255,159,67,0.3); }
.banner-race { background: linear-gradient(135deg, var(--volt-dim), rgba(244,208,63,0.03)); border-color: var(--volt-line); }
.banner-icon { font-size: 22px; flex-shrink: 0; line-height: 1.2; }
.banner-title { font-family: 'Archivo Expanded', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 4px; letter-spacing: 0.2px; }
.banner-deload .banner-title { color: var(--warn); }
.banner-race .banner-title { color: var(--volt); font-size: 18px; letter-spacing: 1px; }
.banner-text { font-size: 12.5px; color: var(--paper-dim); line-height: 1.55; }

/* ============================================================================
   SESSION CARD
   ============================================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-head {
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.card-head::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.card-icon {
  width: 40px; height: 40px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
}
.card-title-group { flex: 1; min-width: 0; }
.card-title { font-family: 'Archivo Expanded', sans-serif; font-weight: 700; font-size: 15.5px; letter-spacing: 0.1px; }
.card-sub { font-size: 11.5px; color: var(--paper-faint); margin-top: 1px; }
.card-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.8px;
  padding: 4px 9px;
  border-radius: 6px;
  flex-shrink: 0;
  text-transform: uppercase;
  white-space: nowrap;
}

.block { padding: 16px 18px; border-bottom: 1px solid var(--line); }
.block:last-child { border-bottom: none; }
.block-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--paper-faint);
  margin-bottom: 10px;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 7px;
  border: 1px solid;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tag-pace { background: var(--p3-dim); border-color: rgba(200,121,224,0.3); color: var(--p3); }
.tag-hr { background: var(--stop-dim); border-color: rgba(255,77,77,0.3); color: #ff8a8a; }
.tag-load { background: var(--info-dim); border-color: rgba(94,200,224,0.3); color: var(--info); }
.tag-rpe { background: var(--warn-dim); border-color: rgba(255,159,67,0.3); color: var(--warn); }
.tag-sets { background: var(--go-dim); border-color: rgba(77,219,143,0.3); color: var(--go); }

.structure-mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: var(--paper-dim);
  line-height: 1.85;
  white-space: pre-line;
}

.cue-prose { font-size: 13px; color: var(--paper-dim); line-height: 1.65; white-space: pre-line; }
.cue-prose strong { color: var(--paper); font-weight: 600; }

/* ============================================================================
   SUPERSET GROUPS
   ============================================================================ */
.ss-group {
  background: var(--surface-2);
  border-radius: var(--r-md);
  padding: 13px 14px;
  margin-bottom: 10px;
  border-left: 3px solid var(--line-bright);
}
.ss-group:last-child { margin-bottom: 0; }
.ss-group.ss-1 { border-left-color: var(--info); }
.ss-group.ss-2 { border-left-color: var(--p3); }
.ss-group.ss-3 { border-left-color: var(--volt); }
.ss-group.ss-4 { border-left-color: var(--p2); }
.ss-group.ss-5 { border-left-color: var(--warn); }
.ss-group.straight { background: transparent; padding: 0; border-left-color: transparent; }

.ss-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--paper-faint);
  margin-bottom: 10px;
}

.exercise-row { padding: 4px 0; }
.exercise-row + .exercise-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
.exercise-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.exercise-name { font-weight: 600; font-size: 14px; color: var(--paper); }
.exercise-cue { font-size: 12px; color: var(--paper-faint); line-height: 1.5; margin-top: 3px; }
.exercise-meta { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

.ss-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--volt);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--line-bright);
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ============================================================================
   STATION BLOCK
   ============================================================================ */
.station-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--line);
}
.station-row:last-child { border-bottom: none; }
.station-row.special { background: var(--volt-dim-2); }
.station-emoji { font-size: 20px; flex-shrink: 0; }
.station-info { flex: 1; min-width: 0; }
.station-name { font-weight: 600; font-size: 13.5px; }
.station-row.special .station-name { color: var(--volt); }

/* ============================================================================
   LOGGING — set-by-set inputs
   ============================================================================ */
.log-block {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--line-bright);
}
.log-block-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}
.log-block-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--volt);
  display: flex;
  align-items: center;
  gap: 5px;
}
.log-block-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--paper-faint);
  letter-spacing: 0.2px;
  font-style: italic;
}

.set-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 7px;
  flex-wrap: wrap;
}
.set-row:last-child { margin-bottom: 0; }
.set-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  color: var(--paper-faint);
  width: 42px;
  flex-shrink: 0;
  letter-spacing: 0.3px;
}

/* field-wrap holds the input + its persistent checkmark together */
.field-wrap {
  position: relative;
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
}
.field-wrap-reps { flex: 0.55; }
.field-wrap-full { width: 100%; flex: none; }
.field {
  width: 100%;
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 7px;
  color: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  padding: 8px 30px 8px 10px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.field:focus { border-color: var(--volt); background: var(--ink); }
.field::placeholder { color: var(--paper-faint); }
.field-wrap.is-saved .field { border-color: rgba(77,219,143,0.45); background: rgba(77,219,143,0.05); }
.field-wrap.is-saved .field:focus { border-color: var(--volt); background: var(--ink); }

/* Persistent checkmark — stays visible as long as a value is saved, not a fading flash */
.field-check {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--go);
  font-size: 12px;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

.field-x { font-family: 'JetBrains Mono', monospace; color: var(--paper-faint); font-size: 11px; flex-shrink: 0; }
.set-prev {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--paper-faint);
  width: 100%;
  padding-left: 49px;
  margin-top: -3px;
}
.set-prev .v { color: var(--volt-deep); }

.single-log-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Day notes textarea */
.notes-area {
  width: 100%;
  min-height: 90px;
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 7px;
  color: var(--paper);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  line-height: 1.6;
  padding: 10px 12px;
  outline: none;
  resize: vertical;
  transition: border-color 0.15s;
}
.notes-area:focus { border-color: var(--volt); }
.notes-area::placeholder { color: var(--paper-faint); font-style: italic; }
.single-log-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--paper-faint);
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.prev-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--volt-deep);
  background: var(--volt-dim-2);
  border-radius: 6px;
  padding: 3px 9px;
  margin-top: 7px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* ============================================================================
   REST DAY
   ============================================================================ */
.rest-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 44px 24px;
  text-align: center;
}
.rest-glyph {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--line-bright);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin: 0 auto 16px;
}
.rest-title {
  font-family: 'Archivo Expanded', sans-serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.5px;
  color: var(--paper-dim);
  margin-bottom: 10px;
}
.rest-text { font-size: 13px; color: var(--paper-faint); line-height: 1.6; max-width: 320px; margin: 0 auto; }

/* ============================================================================
   NUTRITION CARD
   ============================================================================ */
.nutri-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 3px solid var(--volt);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin-bottom: 12px;
}
.nutri-head {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--volt);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nutri-item { display: flex; gap: 11px; margin-bottom: 9px; align-items: flex-start; }
.nutri-item:last-child { margin-bottom: 0; }
.nutri-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  color: var(--on-volt);
  background: var(--volt);
  border-radius: 5px;
  padding: 3px 7px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}
.nutri-text { font-size: 12.5px; color: var(--paper-dim); line-height: 1.5; }

/* ============================================================================
   PROGRESS RAIL
   ============================================================================ */
.progress-rail { margin-bottom: 16px; }
.progress-rail-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}
.progress-rail-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--paper-faint);
  text-transform: uppercase;
}
.progress-rail-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--volt); font-weight: 600; }
.progress-rail-track { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
.progress-rail-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--volt-deep), var(--volt));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 10px rgba(244,208,63,0.4);
}

/* ============================================================================
   BOTTOM NAV
   ============================================================================ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(17,17,19,0.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  display: flex;
  z-index: 200;
  padding-bottom: var(--safe-bottom);
}
.nav-btn {
  flex: 1;
  padding: 11px 4px 9px;
  text-align: center;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.4px;
  color: var(--paper-faint);
  text-transform: uppercase;
  transition: color 0.15s;
  position: relative;
}
.nav-btn.active { color: var(--volt); }
.nav-btn.active::before {
  content: "";
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 2px;
  background: var(--volt);
  border-radius: 2px;
}
.nav-icon { font-size: 19px; display: block; margin-bottom: 3px; }

/* ============================================================================
   REFERENCE TAB — collapsibles
   ============================================================================ */
.ref-section { margin-bottom: 10px; }
.ref-header {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 15px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.ref-header-left { display: flex; align-items: center; gap: 11px; }
.ref-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.ref-title { font-weight: 600; font-size: 13.5px; }
.ref-arrow { color: var(--paper-faint); font-size: 11px; transition: transform 0.2s; }
.ref-arrow.open { transform: rotate(180deg); color: var(--volt); }
.ref-body {
  background: var(--surface);
  border: 1px solid var(--line);
  border-top: none;
  border-radius: 0 0 var(--r-md) var(--r-md);
  display: none;
}
.ref-body.open { display: block; }

.zone-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--line); gap: 11px; }
.zone-row:last-child { border-bottom: none; }
.zone-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.zone-name { font-weight: 600; font-size: 12.5px; width: 86px; flex-shrink: 0; }
.zone-range { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--paper-faint); flex: 1; }
.zone-pace { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--paper-dim); text-align: right; }

.mcgill-item { padding: 13px 16px; border-bottom: 1px solid var(--line); }
.mcgill-item:last-child { border-bottom: none; }
.mcgill-name { font-weight: 600; font-size: 13.5px; margin-bottom: 5px; color: var(--volt); }
.mcgill-desc { font-size: 12.5px; color: var(--paper-dim); line-height: 1.55; }

.race-station-ref { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--line); gap: 12px; }
.race-station-ref:last-child { border-bottom: none; }
.race-station-ref.run { background: var(--p3-dim); }
.station-num-ref { font-family: 'Archivo Expanded', sans-serif; font-weight: 800; font-size: 17px; color: var(--volt); width: 26px; text-align: center; flex-shrink: 0; }
.station-info-ref { flex: 1; }
.station-name-ref { font-weight: 600; font-size: 13.5px; }
.station-spec-ref { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--paper-faint); margin-top: 1px; }
.station-target-ref { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--volt); text-align: right; white-space: nowrap; flex-shrink: 0; }

.flag-item { display: flex; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--line); align-items: flex-start; }
.flag-item:last-child { border-bottom: none; }
.flag-pill { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; margin-top: 1px; letter-spacing: 0.3px; }
.flag-stop { background: var(--stop-dim); color: var(--stop); border: 1px solid rgba(255,77,77,0.3); }
.flag-warn { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(255,159,67,0.3); }
.flag-ok { background: var(--go-dim); color: var(--go); border: 1px solid rgba(77,219,143,0.3); }
.flag-text { font-size: 12.5px; color: var(--paper-dim); line-height: 1.5; }

/* ============================================================================
   LOG VIEW
   ============================================================================ */
.log-hero { margin-bottom: 18px; }
.log-hero-title { font-family: 'Archivo Expanded', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: 0.3px; margin-bottom: 5px; }
.log-hero-title .accent { color: var(--volt); }
.log-hero-sub { font-size: 12.5px; color: var(--paper-faint); }

.log-week-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 9px; overflow: hidden; }
.log-week-head { padding: 13px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid var(--line); }
.log-week-title { font-weight: 700; font-size: 13.5px; font-family: 'Archivo Expanded', sans-serif; }
.log-week-count { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--volt); background: var(--volt-dim-2); padding: 3px 8px; border-radius: 6px; }
.log-week-body { display: none; }
.log-week-body.open { display: block; }
.log-row { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
.log-row:last-child { border-bottom: none; }
.log-row-day { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--paper-faint); text-transform: uppercase; width: 30px; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.3px; }
.log-row-name { font-size: 12.5px; color: var(--paper-dim); flex: 1; }
.log-row-val { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--volt); text-align: right; white-space: nowrap; font-weight: 500; }

.log-empty { text-align: center; padding: 60px 24px; }
.log-empty-icon { font-size: 38px; margin-bottom: 14px; opacity: 0.6; }
.log-empty-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
.log-empty-text { font-size: 12.5px; color: var(--paper-faint); line-height: 1.5; max-width: 260px; margin: 0 auto; }

.danger-btn {
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1px solid rgba(255,77,77,0.3);
  border-radius: var(--r-md);
  color: var(--stop);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.8px;
  margin-top: 18px;
  cursor: pointer;
}
.danger-btn:active { background: var(--stop-dim); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-brand">
    <div class="brand-mark">
      <span class="dot"></span>
      <span class="brand-name">RACE<span class="accent">MODE</span></span>
    </div>
    <div class="countdown-chip"><span class="pulse"></span><span id="countdownText">25 WKS TO DUBLIN</span></div>
    <span id="syncStatus" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--paper-faint);margin-left:2px;" title="Sync status">○</span>
  </div>

  <div class="bib-row">
    <div class="bib">
      <span class="bib-label">WK</span>
      <div class="bib-num-wrap">
        <input class="bib-number num" type="number" id="weekInput" min="1" max="25" value="1" inputmode="numeric">
      </div>
      <span class="bib-of num">/25</span>
    </div>
    <div class="bib-nav">
      <button class="bib-nav-btn" onclick="changeWeek(1)" aria-label="Next week">▲</button>
      <button class="bib-nav-btn" onclick="changeWeek(-1)" aria-label="Previous week">▼</button>
    </div>
    <div class="phase-strip">
      <div class="phase-strip-label">Phase</div>
      <div class="phase-strip-name" id="phaseName">Foundation</div>
      <div class="phase-bar-track"><div class="phase-bar-fill" id="phaseBarFill" style="width:16%;background:var(--p1);"></div></div>
    </div>
  </div>

  <div class="day-rail" id="dayRail">
    <div class="day-chip active" data-day="0" onclick="switchDay(0)">MON<span class="tag">strength</span></div>
    <div class="day-chip" data-day="1" onclick="switchDay(1)">TUE<span class="tag">run+ski</span></div>
    <div class="day-chip" data-day="2" onclick="switchDay(2)">WED<span class="tag">hypertrophy</span></div>
    <div class="day-chip" data-day="3" onclick="switchDay(3)">THU<span class="tag">key run</span></div>
    <div class="day-chip" data-day="4" onclick="switchDay(4)">FRI<span class="tag">power+stations</span></div>
    <div class="day-chip" data-day="5" onclick="switchDay(5)">SAT<span class="tag">long/brick</span></div>
    <div class="day-chip is-rest" data-day="6" onclick="switchDay(6)">SUN<span class="tag">rest</span></div>
  </div>
</header>

<!-- TODAY VIEW -->
<div id="trainingView" class="view active">
  <div class="content" id="dayContent"></div>
</div>

<!-- LOG VIEW -->
<div id="logView" class="view">
  <div class="content" id="logContent"></div>
</div>

<!-- REFERENCE VIEW -->
<div id="referenceView" class="view">
  <div class="content" id="referenceContent"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="btnTraining" onclick="switchView('training')">
    <span class="nav-icon">▣</span>TODAY
  </button>
  <button class="nav-btn" id="btnLog" onclick="switchView('log')">
    <span class="nav-icon">◷</span>LOG
  </button>
  <button class="nav-btn" id="btnWeight" onclick="switchView('weight')">
    <span class="nav-icon">◎</span>WEIGHT
  </button>

  </button>

<script>
/* ============================================================================
   DATA LAYER — programmed sessions, all 25 weeks, all phases
   (FB1 / FB2 / FB3 / Tue / Thu / Sat session generators)
   ============================================================================ */
const PHASES = {
  1:{name:"FOUNDATION",label:"phase-1",weeks:[1,2,3,4,5,6],dates:"18 May – 28 Jun"},
  2:{name:"BUILD",label:"phase-2",weeks:[7,8,9,10,11,12,13,14],dates:"29 Jun – 23 Aug"},
  3:{name:"PEAK",label:"phase-3",weeks:[15,16,17,18,19,20],dates:"24 Aug – 4 Oct"},
  4:{name:"TAPER",label:"phase-4",weeks:[21,22,23,24,25],dates:"5 Oct – 8 Nov"},
};

function getPhase(wk) {
  for (const [p,pd] of Object.entries(PHASES)) if (pd.weeks.includes(wk)) return parseInt(p);
  return 1;
}

// ─── SESSION DATA ──────────────────────────────────────────────────────────────

function getFB1(wk) {
  // Monday: Heavy Strength
  const loads = {
    backSquat:{
      // Capped at 120kg — progression via sets/reps/tempo, not load
      1:"110kg",2:"110kg",3:"112.5kg",4:"112.5kg",5:"115kg",6:"115kg",
      7:"115kg",8:"117.5kg",9:"117.5kg",10:"DELOAD 95kg",
      11:"117.5kg",12:"120kg",13:"120kg",14:"120kg",
      15:"120kg",16:"120kg",17:"120kg",18:"120kg",19:"120kg",20:"120kg",
      21:"115kg",22:"112.5kg",23:"110kg",24:"107.5kg",25:"Race week — skip"},
    pullUp:{1:"BW+15kg",2:"BW+15kg",3:"BW+17kg",4:"BW+17kg",5:"BW+20kg",6:"BW+20kg",
            7:"BW+25kg",8:"BW+25kg",9:"BW+27kg",10:"DELOAD BW only",
            11:"BW+27kg",12:"BW+28kg",13:"BW+30kg",14:"BW+30kg",
            15:"BW+32kg",16:"BW+32kg",17:"MAX attempt",18:"BW+30kg",19:"BW+32kg",20:"BW+33kg",
            21:"BW+28kg",22:"BW+25kg",23:"BW+22kg",24:"BW+20kg",25:"Skip"},
    rdl:{
      // Conservative — start 80kg, +2.5kg every 2 weeks, hard cap 120kg
      1:"80kg",2:"80kg",3:"82.5kg",4:"82.5kg",5:"85kg",6:"85kg",
      7:"87.5kg",8:"87.5kg",9:"90kg",10:"DELOAD 75kg",
      11:"92.5kg",12:"92.5kg",13:"95kg",14:"97.5kg",
      15:"100kg",16:"102.5kg",17:"105kg",18:"107.5kg",19:"110kg",20:"112.5kg",
      21:"110kg",22:"105kg",23:"100kg",24:"95kg",25:"Skip"},
    ohp:{1:"60kg",2:"62.5kg",3:"65kg",4:"65kg",5:"67.5kg",6:"70kg",
         7:"70kg",8:"72.5kg",9:"72.5kg",10:"DELOAD 60kg",
         11:"75kg",12:"75kg",13:"77.5kg",14:"77.5kg",
         15:"77.5kg",16:"80kg",17:"80kg",18:"80kg",19:"82.5kg",20:"82.5kg",
         21:"75kg",22:"72.5kg",23:"70kg",24:"65kg",25:"Skip"},
    cgbench:{
      // Close-grip bench — replaces dips
      1:"70kg",2:"72.5kg",3:"75kg",4:"75kg",5:"77.5kg",6:"80kg",
      7:"80kg",8:"82.5kg",9:"85kg",10:"DELOAD 70kg",
      11:"87.5kg",12:"90kg",13:"92.5kg",14:"95kg",
      15:"95kg",16:"97.5kg",17:"100kg",18:"100kg",19:"102.5kg",20:"105kg",
      21:"97.5kg",22:"95kg",23:"90kg",24:"85kg",25:"Skip"},
  };
  const ph = getPhase(wk);
  const sets = {
    1:{sq:"4×5",pu:"4×5",rdl:"4×6",ohp:"3×6",cgb:"3×6"},
    2:{sq:"5×4",pu:"5×4",rdl:"4×5",ohp:"4×5",cgb:"4×5"},
    3:{sq:"5×3",pu:"5×3",rdl:"4×5",ohp:"4×4",cgb:"4×4"},
    4:{sq:"3×3",pu:"3×4",rdl:"3×5",ohp:"3×5",cgb:"3×5"}}[ph];

  // Phase-specific squat cue
  const sqCue = ph===1
    ? "High bar or low bar — whichever feels natural. HARD CAP: never go above 120kg. Depth to parallel minimum. 3.5 min rest."
    : ph===2
    ? "5 sets now. Progression is density and volume, not weight. Stay in the 110-120kg range. Pause at the bottom 2s in Ph2."
    : ph===3
    ? "3-second descent mandatory. Slow eccentric is the stimulus now that load is capped. Control every rep."
    : "Taper. 3 sets only. Same feel, less volume.";

  return {
    type:"strength", title:"FB1 — Heavy Strength", icon:"🏋️", iconBg:"var(--teal-dim)",
    time:"Lunchtime · ~48 min", badge:"MONDAY",
    warmup:"McGill Big 3 (8 min) → Goblet squat 2×10 BW → Band pull-apart 2×15 → Dead hang 2×20s",
    groups:[
      {type:"straight",label:"A — STRAIGHT SETS · 3.5 min rest",exercises:[
        {name:"Back Squat",spec:`${sets.sq} · ${loads.backSquat[wk]}`,rpe:"8–8.5",
         cue:`LOAD CAP: 120kg maximum all program. ${sqCue}`}
      ]},
      {type:"pair",pairClass:"pair-1",label:"B1/B2 — SUPERSET · move immediately · 2.5 min rest after B2",exercises:[
        {name:"Weighted Pull-Up (neutral grip)",spec:`${sets.pu} · ${loads.pullUp[wk]}`,rpe:"8.5–9.5",
         cue:"Dead hang at bottom. Ph1 controlled, Ph2-3 explosive up. 3s descent. No kipping. Neutral grip always."},
        {name:"Barbell RDL",spec:`${sets.rdl} · ${loads.rdl[wk]}`,rpe:"7.5–8.5",
         cue:"CONSERVATIVE LOAD. Neutral spine non-negotiable. Bar drags shins. Stop at mid-shin. ANY lumbar sensation — reduce load immediately. Cap: 120kg."},
      ]},
      {type:"pair",pairClass:"pair-2",label:"C1/C2 — SUPERSET · move immediately · 2 min rest after C2",exercises:[
        {name:"Standing Barbell OHP",spec:`${sets.ohp} · ${loads.ohp[wk]}`,rpe:"8.5–9.5",
         cue:"Strict — zero leg drive. Full lockout at top. Glutes squeezed. Move straight to close-grip bench."},
        {name:"Close-Grip Bench Press",spec:`${sets.cgb} · ${loads.cgbench[wk]}`,rpe:"8.5–9.5",
         cue:"Hands shoulder-width or slightly narrower. Elbows tucked at 45° — never flare. Full lockout at top. 3s descent. Replaces dips — no shoulder impingement risk."},
      ]},
      {type:"straight",label:"D — CORE FINISHER · 60s rest between exercises",exercises:[
        {name:"McGill Big 3 + Ab Wheel",spec:ph<3?"3 sets":"3 sets (full rollout)",rpe:"6–7",
         cue:"Curl-up 10 reps (8s hold). Side plank 30–45s/side. Ab wheel: hollow body, no lower back arch."}
      ]},
    ]
  };
}

function getFB2(wk) {
  // Wednesday: Hypertrophy
  const ph = getPhase(wk);
  const loads = {
    bench:{1:"2×32kg",2:"2×34kg",3:"2×34kg",4:"2×36kg",5:"2×36kg",6:"2×38kg",
           7:"2×38kg+DROP",8:"2×40kg+DROP",9:"2×40kg+DROP",10:"DELOAD 2×32kg",
           11:"2×42kg+DROP",12:"2×42kg+DROP",13:"2×44kg+DROP",14:"2×44kg+DROP",
           15:"2×44kg+REST-PAUSE",16:"2×46kg",17:"2×46kg",18:"2×48kg",19:"2×48kg",20:"2×48kg",
           21:"2×42kg",22:"2×40kg",23:"2×38kg",24:"2×36kg",25:"Skip"},
    row:{1:"60kg",2:"62.5kg",3:"65kg",4:"65kg",5:"67.5kg",6:"70kg",
         7:"70kg",8:"72.5kg",9:"75kg",10:"DELOAD 60kg",
         11:"77.5kg",12:"80kg",13:"82.5kg",14:"82.5kg",
         15:"85kg",16:"85kg",17:"87.5kg",18:"87.5kg",19:"90kg",20:"90kg",
         21:"80kg",22:"77.5kg",23:"75kg",24:"72.5kg",25:"Skip"},
    incline:{1:"2×30kg",2:"2×32kg",3:"2×32kg",4:"2×34kg",5:"2×34kg",6:"2×36kg",
             7:"2×36kg+DROP",8:"2×38kg+DROP",9:"2×38kg+DROP",10:"DELOAD 2×28kg",
             11:"2×40kg+DROP",12:"2×40kg+DROP",13:"2×42kg+DROP",14:"2×42kg+DROP",
             15:"2×42kg+REST-PAUSE",16:"2×44kg",17:"2×44kg",18:"2×46kg",19:"2×46kg",20:"2×46kg",
             21:"2×38kg",22:"2×36kg",23:"2×34kg",24:"2×32kg",25:"Skip"},
    lat:{1:"70kg",2:"72.5kg",3:"75kg",4:"75kg",5:"77.5kg",6:"80kg",
         7:"80kg",8:"82.5kg",9:"85kg",10:"DELOAD 70kg",
         11:"87.5kg",12:"90kg",13:"92.5kg",14:"95kg",
         15:"95kg",16:"97.5kg",17:"97.5kg",18:"100kg",19:"100kg",20:"100kg",
         21:"87.5kg",22:"85kg",23:"82.5kg",24:"80kg",25:"Skip"},
    split:{1:"2×20kg",2:"2×22kg",3:"2×22kg",4:"2×24kg",5:"2×24kg",6:"2×26kg",
           7:"2×26kg",8:"2×28kg",9:"2×28kg",10:"DELOAD 2×20kg",
           11:"2×30kg",12:"2×30kg",13:"2×32kg",14:"2×32kg",
           15:"2×32kg",16:"2×34kg",17:"2×34kg",18:"2×36kg",19:"2×36kg",20:"2×38kg",
           21:"2×28kg",22:"2×26kg",23:"2×24kg",24:"2×22kg",25:"Skip"},
    curl:{1:"18kg",2:"18kg",3:"20kg",4:"20kg",5:"20kg",6:"22kg",
          7:"22kg",8:"22kg",9:"24kg",10:"DELOAD 16kg",
          11:"24kg",12:"24kg",13:"26kg",14:"26kg",
          15:"26kg",16:"26kg",17:"28kg",18:"28kg",19:"28kg",20:"30kg",
          21:"22kg",22:"22kg",23:"20kg",24:"20kg",25:"Skip"},
  };
  const setsMap = {
    1:{bench:"4×10",row:"4×10",incline:"3×10",lat:"3×10",split:"3×10",curl:"3×12"},
    2:{bench:"4×8",row:"4×10",incline:"4×10",lat:"4×10",split:"3×8",curl:"3×10"},
    3:{bench:"4×8",row:"4×10",incline:"4×8",lat:"4×10",split:"3×8",curl:"3×10"},
    4:{bench:"2×10",row:"2×10",incline:"2×10",lat:"2×10",split:"2×8",curl:"2×12"},
  };
  const s = setsMap[ph];
  const dropNote = ph===2?" + DROP SET final set":ph===3?" + REST-PAUSE final set":"";

  return {
    type:"strength", title:"FB2 — Hypertrophy", icon:"💪", iconBg:"var(--purple-dim)",
    time:"Free day · ~50 min", badge:"WEDNESDAY",
    warmup:"McGill Big 3 (8 min) → Face pull 2×15 light → Incline DB fly 1×12 light\nLower body: split squat + hamstring curl ONLY — protects Thursday run.",
    groups:[
      {type:"pair",pairClass:"pair-1",label:"A1/A2 — SUPERSET · 75s rest after A2",exercises:[
        {name:"DB Bench Press (Flat)",spec:`${s.bench}${dropNote} · ${loads.bench[wk]}`,rpe:"8–9",
         cue:"Full range — DBs touch chest. Explosive up, 3s down. Elbows 75°. Move to cable row immediately."},
        {name:"Seated Cable Row",spec:`${s.row} · ${loads.row[wk]}`,rpe:"8–8.5",
         cue:"Chest tall. Row to lower sternum. Hold 1s squeeze. Control return. V-bar Ph1-2, wide grip Ph3."},
      ]},
      {type:"pair",pairClass:"pair-2",label:"B1/B2 — SUPERSET · 75s rest after B2",exercises:[
        {name:"Incline DB Press",spec:`${s.incline}${dropNote} · ${loads.incline[wk]}`,rpe:"8–9",
         cue:"15-30° incline. Upper chest emphasis. Move to lat pulldown immediately."},
        {name:"Lat Pulldown (Neutral grip)",spec:`${s.lat} · ${loads.lat[wk]}`,rpe:"8–8.5",
         cue:"Pull to upper chest. Elbows drive down and back. Full stretch at top. Ph3: alternate with straight-arm pulldown."},
      ]},
      {type:"pair",pairClass:"pair-3",label:"C1/C2 — SUPERSET · 90s rest after C2",exercises:[

const REST_DAY = (msg) => ({type:"rest", message: msg||"Full rest. Sleep well. Eat well. Let the adaptations consolidate."});

function getSessionForDay(wk, dayIdx) {
  if (wk===25 && dayIdx!==1) return REST_DAY("Post-race recovery week. No training.");
  switch(dayIdx) {
    case 0: return getFB1(wk);    // Mon
    case 1: return getTue(wk);    // Tue
    case 2: return getFB2(wk);    // Wed
    case 3: return getThu(wk);    // Thu
    case 4: return getFB3(wk);    // Fri
    case 5: return getSat(wk);    // Sat
    case 6: return REST_DAY("Sunday — full rest. Adaptation happens during recovery, not during training.");
    default: return REST_DAY();
  }
}



/* ============================================================================
   FIREBASE — Firestore cloud sync + localStorage fallback
   IMPORTANT: uses dynamic import() inside a try/catch, NOT a static top-level
   import. A static import is blocking and fatal — if the Firebase CDN fails
   to load for any reason (network, ad blocker, offline), the ENTIRE script
   stops executing and every function in the app becomes "not defined".
   Dynamic import() here means Firebase is optional: if it fails, the whole
   app still works perfectly using localStorage only.
   ============================================================================ */
const STORAGE_KEY = "raceModeLog_v2";
let LOG_DATA = {};
let DB_READY = false;
let firestoreRefs = null; // { db, doc, getDoc, setDoc, LOG_DOC }

function showSyncStatus(state) {
  let el = document.getElementById("syncStatus");
  if (!el) return;
  el.textContent = state === "saving" ? "↑" : state === "saved" ? "✓" : state === "offline" ? "○" : "";
  el.style.color = state === "saved" ? "var(--go)" : state === "saving" ? "var(--volt)" : "var(--paper-faint)";
}

// Attempt to load Firebase. If this fails for ANY reason, the app keeps
// working on localStorage alone — nothing else in the script is affected.
async function tryConnectFirebase() {
  try {
    const [{ initializeApp }, { getFirestore, doc, getDoc, setDoc }] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
    ]);

    const firebaseConfig = {
      apiKey: "AIzaSyA29E90-N-sdYUyoffeiVsi85HQeteuDSU",
      authDomain: "hyrox-dublin.firebaseapp.com",
      projectId: "hyrox-dublin",
      storageBucket: "hyrox-dublin.firebasestorage.app",
      messagingSenderId: "251584341799",
      appId: "1:251584341799:web:4a42b16116c0ed4284ab02"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const LOG_DOC = doc(db, "athletes", "ashish");

    firestoreRefs = { getDoc, setDoc, LOG_DOC };
    return true;
  } catch(e) {
    console.warn("Firebase failed to load — continuing with localStorage only.", e);
    return false;
  }
}

// Load from Firestore on startup, fall back to localStorage
async function initStorage() {
  // Load localStorage immediately so UI isn't blank while Firestore responds
  try {
    const local = localStorage.getItem(STORAGE_KEY);
    if (local) LOG_DATA = JSON.parse(local);
  } catch(e) {}

  const connected = await tryConnectFirebase();
  if (!connected) {
    showSyncStatus("offline");
    return;
  }

  try {
    const snap = await firestoreRefs.getDoc(firestoreRefs.LOG_DOC);
    if (snap.exists()) {
      LOG_DATA = snap.data().log || {};
      localStorage.setItem(STORAGE_KEY, JSON.stringify(LOG_DATA));
    }
    DB_READY = true;
    showSyncStatus("saved");
  } catch(e) {
    console.warn("Firestore read failed, using localStorage", e);
    showSyncStatus("offline");
  }
}

// Debounced Firestore write — batches rapid keystrokes into one write
let _syncTimer = null;
function scheduleSyncToFirestore() {
  if (!DB_READY) { showSyncStatus("offline"); return; }
  showSyncStatus("saving");
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    try {
      await firestoreRefs.setDoc(firestoreRefs.LOG_DOC, { log: LOG_DATA, updatedAt: new Date().toISOString() });
      showSyncStatus("saved");
    } catch(e) {
      console.warn("Firestore write failed", e);
      showSyncStatus("offline");
    }
  }, 1200);
}

function loadLog() { return LOG_DATA; }

function saveLog(data) {
  LOG_DATA = data;
  // Always write localStorage immediately (works offline)
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  // Queue Firestore write
  scheduleSyncToFirestore();
}

function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }

function getLogValue(wk, dayIdx, key) {
  const wkKey = `wk${wk}`, dayKey = `d${dayIdx}`;
  return LOG_DATA[wkKey]?.[dayKey]?.[key] || "";
}
function setLogValue(wk, dayIdx, key, displayName, value) {
  const wkKey = `wk${wk}`, dayKey = `d${dayIdx}`;
  if (!LOG_DATA[wkKey]) LOG_DATA[wkKey] = {};
  if (!LOG_DATA[wkKey][dayKey]) LOG_DATA[wkKey][dayKey] = {};
  if (value.trim() === "") delete LOG_DATA[wkKey][dayKey][key];
  else LOG_DATA[wkKey][dayKey][key] = value;
  if (!LOG_DATA[wkKey][dayKey].__names) LOG_DATA[wkKey][dayKey].__names = {};
  LOG_DATA[wkKey][dayKey].__names[key] = displayName;
  saveLog(LOG_DATA);
}
function getLastValue(wk, dayIdx, key, lookback=4) {
  for (let back=1; back<=lookback; back++) {
    const prevWk = wk - back;
    if (prevWk < 1) break;
    const v = getLogValue(prevWk, dayIdx, key);
    if (v) return {value: v, weeksAgo: back};
  }
  return null;
}
function handleInput(el, wk, dayIdx, key, name) {
  setLogValue(wk, dayIdx, key, name, el.value);
  markFieldSaved(el, el.value.trim() !== "");
}

// Persistent save indicator — stays visible as long as the field has a value,
// not just a 1-second flash. This is the fix for "no confirmation that data was entered."
function markFieldSaved(el, hasValue) {
  const wrap = el.closest(".field-wrap");
  if (!wrap) return;
  const check = wrap.querySelector(".field-check");
  wrap.classList.toggle("is-saved", hasValue);
  if (check) check.style.opacity = hasValue ? "1" : "0";
}

function parseSpec(spec) {
  if (!spec) return {sets:3, repsHint:"reps", loadHint:"load"};
  const setsMatch = spec.match(/(\d+)\s*×/);
  const sets = setsMatch ? parseInt(setsMatch[1]) : 3;
  const repsMatch = spec.match(/×\s*(\d+)/);
  const repsHint = repsMatch ? repsMatch[1] : "reps";
  const loadMatch = spec.match(/([\d.]+kg(?:\/\w+)?|BW\+?[\d.]*kg?|2×[\d.]+kg)/i);
  const loadHint = loadMatch ? loadMatch[0] : "load";
  return {sets, repsHint, loadHint};
}

function renderSetLogRows(wk, dayIdx, exName, spec) {
  const {sets, repsHint, loadHint} = parseSpec(spec);
  const exSlug = slugify(exName);
  let rows = "";
  for (let i=1; i<=sets; i++) {
    const loadKey = `${exSlug}__s${i}_load`, repsKey = `${exSlug}__s${i}_reps`;
    const curLoad = getLogValue(wk, dayIdx, loadKey);
    const curReps = getLogValue(wk, dayIdx, repsKey);
    const lwLoad = getLastValue(wk, dayIdx, loadKey);
    const lwReps = getLastValue(wk, dayIdx, repsKey);
    const lwText = (lwLoad || lwReps)
      ? `<div class="set-prev">prev: <span class="v">${lwLoad?.value||'–'}${lwReps?.value?' × '+lwReps.value:''}</span></div>` : "";
    const loadSaved = curLoad.trim() !== "";
    const repsSaved = curReps.trim() !== "";
    rows += `
      <div class="set-row">
        <span class="set-tag">SET ${i}</span>
        <span class="field-wrap ${loadSaved?'is-saved':''}">
          <input type="text" class="field" placeholder="${loadHint}" value="${curLoad.replace(/"/g,'&quot;')}"
            oninput="handleInput(this, ${wk}, ${dayIdx}, '${loadKey}', '${exName.replace(/'/g,"\\'")} — set ${i} load')">
          <span class="field-check" style="opacity:${loadSaved?1:0}">✓</span>
        </span>
        <span class="field-x">×</span>
        <span class="field-wrap field-wrap-reps ${repsSaved?'is-saved':''}">
          <input type="text" class="field field-reps" placeholder="${repsHint}" value="${curReps.replace(/"/g,'&quot;')}"
            oninput="handleInput(this, ${wk}, ${dayIdx}, '${repsKey}', '${exName.replace(/'/g,"\\'")} — set ${i} reps')">
          <span class="field-check" style="opacity:${repsSaved?1:0}">✓</span>
        </span>
      </div>
      ${lwText}`;
  }
  return `
    <div class="log-block">
      <div class="log-block-head">
        <span class="log-block-title">⏺ LOG YOUR SETS</span>
        <span class="log-block-hint">tap a field to edit</span>
      </div>
      ${rows}
    </div>`;
}

function renderSingleLog(wk, dayIdx, name, placeholder) {
  const slug = slugify(name);
  const cur = getLogValue(wk, dayIdx, slug);
  const lw = getLastValue(wk, dayIdx, slug);
  const lwHtml = lw ? `<div class="prev-pill">📌 ${lw.weeksAgo===1?'last week':lw.weeksAgo+' wks ago'}: ${lw.value}</div>` : "";
  const isSaved = cur.trim() !== "";
  return `
    <div class="log-block">
      <div class="log-block-head">
        <span class="single-log-label">YOU DID</span>
        <span class="log-block-hint">tap to edit</span>
      </div>
      <span class="field-wrap field-wrap-full ${isSaved?'is-saved':''}">
        <input type="text" class="field" placeholder="${placeholder||'enter value'}" value="${cur.replace(/"/g,'&quot;')}"
          oninput="handleInput(this, ${wk}, ${dayIdx}, '${slug}', '${name.replace(/'/g,"\\'")}')">
        <span class="field-check" style="opacity:${isSaved?1:0}">✓</span>
      </span>
      ${lwHtml}
    </div>`;
}

function renderSession(sess, wk, dayIdx) {

  if (sess.type==="brick") return renderBrick(sess, wk, dayIdx);
  return renderRest(sess);
}

function renderDay(wk, dayIdx) {
  const sess = getSessionForDay(wk, dayIdx);
  const isDeload = wk===10;
  const ph = getPhase(wk);
  const pct = Math.round((wk/25)*100);

  let html = `
    <div class="progress-rail">
      <div class="progress-rail-top">
        <span class="progress-rail-label">Week ${wk} of 25</span>
        <span class="progress-rail-pct">${pct}%</span>
      </div>
      <div class="progress-rail-track"><div class="progress-rail-fill" style="width:${pct}%"></div></div>

  if (isDeload) {
    html += `<div class="banner banner-deload">

      <div><div class="banner-title">DELOAD WEEK</div>
      <div class="banner-text">Volume drops ~40%. Same paces. You'll feel good and want to do more — don't. The rest IS the training.</div></div>

function updateHeaderForWeek(wk) {
  const ph = getPhase(wk);
  const pd = PHASES[ph];
  document.getElementById("phaseName").textContent = pd.name;
  const fill = document.getElementById("phaseBarFill");
  fill.style.width = `${Math.round((wk/25)*100)}%`;
  fill.style.background = PHASE_COLOR[ph];
  const weeksLeft = 25 - wk;
  document.getElementById("countdownText").textContent =
    weeksLeft <= 0 ? "RACE WEEK" : `${weeksLeft} WK${weeksLeft===1?'':'S'} TO DUBLIN`;

function switchDay(idx) {
  currentDay = idx;
  document.querySelectorAll(".day-chip").forEach((c,i)=>c.classList.toggle("active", i===idx));
  renderDay(currentWeek, idx);

function changeWeek(delta) {
  const inp = document.getElementById("weekInput");
  let v = Math.max(1, Math.min(25, (parseInt(inp.value)||1) + delta));
  inp.value = v; currentWeek = v;
  updateHeaderForWeek(v);
  renderDay(v, currentDay);
}

document.getElementById("weekInput").addEventListener("change", function() {
  let v = Math.max(1, Math.min(25, parseInt(this.value)||1));
  this.value = v; currentWeek = v;
  updateHeaderForWeek(v);
  renderDay(v, currentDay);
});

function switchView(view) {
  ["training","log","weight","reference"].forEach(v => {
    const viewId = v==="training"?"trainingView":v==="log"?"logView":v==="weight"?"weightView":"referenceView";
    const btnId  = v==="training"?"btnTraining":v==="log"?"btnLog":v==="weight"?"btnWeight":"btnReference";

const DAY_NAMES = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

function cleanLogName(raw) {
  return raw
    .replace(/_pace$|_ski$|_feel$|_finish$/,'')
    .replace(/^station_/,'◎ ')
    .replace(/—.*$/,'')
    .replace(/_/g,' ')
    .trim();
}

function renderLogView() {
  LOG_DATA = loadLog();
  const weekKeys = Object.keys(LOG_DATA)
    .filter(k => Object.keys(LOG_DATA[k]).some(d => Object.keys(LOG_DATA[k][d]).filter(x=>x!=="__names").length>0))
    .sort((a,b)=>parseInt(b.replace('wk',''))-parseInt(a.replace('wk','')));

  let html = `
    <div class="log-hero">
      <div class="log-hero-title">YOUR <span class="accent">LOG</span></div>
      <div class="log-hero-sub">Every number you've entered, most recent week first. Saved on this device.</div>
    </div>`;

  if (weekKeys.length===0) {
    html += `<div class="log-empty">
      <div class="log-empty-icon">◷</div>
      <div class="log-empty-title">Nothing logged yet</div>
      <div class="log-empty-text">Log a weight, time, or pace on the Today tab — it shows up here automatically.</div>
    </div>`;
  } else {
    weekKeys.forEach((wkKey, idx) => {
      const wk = parseInt(wkKey.replace('wk',''));
      const dayData = LOG_DATA[wkKey];
      const dayKeys = Object.keys(dayData)
        .filter(d => Object.keys(dayData[d]).filter(x=>x!=="__names").length>0)
        .sort((a,b)=>parseInt(a.replace('d',''))-parseInt(b.replace('d','')));
      let count = 0;
      dayKeys.forEach(dk => count += Object.keys(dayData[dk]).filter(x=>x!=="__names").length);

      html += `
        <div class="log-week-card">
          <div class="log-week-head" onclick="toggleLogWeek(this)">
            <div class="log-week-title">Week ${wk}</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="log-week-count">${count}</span>
              <span class="ref-arrow ${idx===0?'open':''}">▾</span>
            </div>
          </div>
          <div class="log-week-body ${idx===0?'open':''}">`;

      dayKeys.forEach(dk => {
        const dayIdx = parseInt(dk.replace('d',''));
        const names = dayData[dk].__names || {};
        Object.keys(dayData[dk]).filter(x=>x!=="__names").forEach(key => {
          const displayName = names[key] || key;
          html += `<div class="log-row">
              <div class="log-row-day">${DAY_NAMES[dayIdx]}</div>
              <div class="log-row-name">${cleanLogName(displayName)}</div>
              <div class="log-row-val">${dayData[dk][key]}</div>
            </div>`;
        });
      });
      html += `</div></div>`;
    });
    html += `<button class="danger-btn" onclick="confirmClearLog()">⊗ CLEAR ALL LOGGED DATA</button>`;
  }
  document.getElementById("logContent").innerHTML = html;
}

function toggleLogWeek(header) {
  header.nextElementSibling.classList.toggle("open");
  header.querySelector(".ref-arrow").classList.toggle("open");
}
function confirmClearLog() {
  if (confirm("Delete all logged data on this device? This cannot be undone.")) {
    localStorage.removeItem(STORAGE_KEY);
    LOG_DATA = {};
    renderLogView();
  }
}

/* ============================================================================
   BODYWEIGHT TRACKER
   Completely separate key from session log — raceModeWeight_v1 vs raceModeLog_v2.
   No overlap possible. Adding entries here cannot affect session log data.
   ============================================================================ */
const WEIGHT_KEY = "raceModeWeight_v1";

function loadWeightLog() {
  try { const r = localStorage.getItem(WEIGHT_KEY); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function saveWeightLog(entries) {
  try { localStorage.setItem(WEIGHT_KEY, JSON.stringify(entries)); }
  catch(e) {}
  // Also sync to Firestore if connected — stored separately from session log
  if (DB_READY && firestoreRefs) {
    clearTimeout(saveWeightLog._t);
    saveWeightLog._t = setTimeout(async () => {
      try {
        const { setDoc, doc, LOG_DOC } = firestoreRefs;
        // Store weight under a sibling doc athletes/ashish_weight to keep it separate
        const { getFirestore } = firestoreRefs;
        // Simple approach: store weight array in the same doc under a 'weight' key
        await firestoreRefs.setDoc(
          firestoreRefs.LOG_DOC,
          { weight: entries },
          { merge: true }  // merge: true so session log data is untouched
        );
      } catch(e) { console.warn("Weight Firestore sync failed", e); }
    }, 1200);
  }
}

function logWeight(kg) {
  const entries = loadWeightLog();
  const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
  // Update today's entry if it exists, otherwise add new
  const idx = entries.findIndex(e => e.date === today);
  if (idx >= 0) entries[idx].kg = kg;
  else entries.push({ date: today, kg });
  // Keep sorted newest first, cap at 200 entries (covers the whole program many times over)
  entries.sort((a,b) => b.date.localeCompare(a.date));
  if (entries.length > 200) entries.splice(200);
  saveWeightLog(entries);
  return entries;
}

function deleteWeightEntry(date) {
  const entries = loadWeightLog().filter(e => e.date !== date);
  saveWeightLog(entries);
  renderWeightView();
}
window.deleteWeightEntry = deleteWeightEntry;

function submitWeight() {
  const input = document.getElementById("weightInput");
  const val = parseFloat(input.value);
  if (!val || val < 30 || val > 250) {
    input.style.borderColor = "var(--stop)";
    setTimeout(() => input.style.borderColor = "", 800);
    return;
  }
  const entries = logWeight(val);
  input.value = "";
  renderWeightView();
}
window.submitWeight = submitWeight;

function handleWeightKey(e) { if (e.key === "Enter") submitWeight(); }
window.handleWeightKey = handleWeightKey;

function buildSparkline(entries, width=320, height=80) {
  // Take the most recent 10 entries, oldest first for left→right chart
  const points = entries.slice(0,10).reverse();
  if (points.length < 2) return "";

  const kgs = points.map(p => p.kg);
  const minKg = Math.min(...kgs);
  const maxKg = Math.max(...kgs);
  const range = maxKg - minKg || 1;
  const pad = 12;

  const coords = points.map((p, i) => {
    const x = pad + (i / (points.length - 1)) * (width - pad*2);
    const y = pad + (1 - (p.kg - minKg) / range) * (height - pad*2);
    return {x, y, kg: p.kg, date: p.date};
  });

  const pathD = coords.map((c,i) => `${i===0?'M':'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');

  // Gradient fill under the line
  const fillD = pathD + ` L${coords[coords.length-1].x.toFixed(1)},${height} L${coords[0].x.toFixed(1)},${height} Z`;

  const dots = coords.map(c => `
    <circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="var(--volt)" stroke="var(--ink)" stroke-width="1.5"/>
  `).join('');

  // Min/max labels
  const highest = coords.reduce((a,b) => a.kg > b.kg ? a : b);
  const lowest  = coords.reduce((a,b) => a.kg < b.kg ? a : b);

  return `
    <svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg"
         style="width:100%;height:${height}px;display:block;overflow:visible;">
      <defs>
        <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--volt)" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="var(--volt)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#wGrad)"/>
      <path d="${pathD}" fill="none" stroke="var(--volt)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      <text x="${highest.x.toFixed(1)}" y="${(highest.y - 7).toFixed(1)}"
            fill="var(--go)" font-family="JetBrains Mono,monospace" font-size="9" text-anchor="middle">${highest.kg}kg</text>
      ${lowest.kg !== highest.kg ? `<text x="${lowest.x.toFixed(1)}" y="${(lowest.y + 14).toFixed(1)}"
            fill="var(--stop)" font-family="JetBrains Mono,monospace" font-size="9" text-anchor="middle">${lowest.kg}kg</text>` : ''}
    </svg>`;
}

function renderWeightView() {

            <input type="number" id="weightInput" class="field" placeholder="${todayEntry ? todayEntry.kg : '85.0'}"

          </span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--paper-faint);flex-shrink:0;">kg</span>
          <button onclick="submitWeight()" style="
            background:var(--volt);color:var(--on-volt);border:none;border-radius:8px;

            padding:9px 16px;cursor:pointer;flex-shrink:0;letter-spacing:0.5px;">
            ${todayEntry ? 'UPDATE' : 'SAVE'}

        </div>
        ${todayEntry ? `<div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--go);">✓ TODAY LOGGED — ${todayEntry.kg}kg · tap to update</div>` : ''}
      </div>
    </div>`;

  // Stats row if we have data
  if (entries.length > 0) {
    html += `

      <div class="card" style="padding:14px;text-align:center;">

        <div style="font-family:'Archivo Expanded',sans-serif;font-size:20px;font-weight:800;color:var(--volt);">${latest.kg}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--paper-faint);">kg</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--paper-faint);letter-spacing:1px;margin-bottom:6px;">START</div>
        <div style="font-family:'Archivo Expanded',sans-serif;font-size:20px;font-weight:800;color:var(--paper-dim);">${startWeight}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--paper-faint);">kg</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--paper-faint);letter-spacing:1px;margin-bottom:6px;">CHANGE</div>
        <div style="font-family:'Archivo Expanded',sans-serif;font-size:20px;font-weight:800;color:${changeColor};">${change !== null ? (parseFloat(change) > 0 ? '+':'')+change : '—'}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--paper-faint);">kg</div>
      </div>
    </div>`;
  }

  // Sparkline chart
  if (entries.length >= 2) {
    html += `
    <div class="card" style="margin-bottom:12px;">
      <div class="card-head">
        <div class="card-icon" style="background:var(--volt-dim);">↗</div>

        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (entries.length === 0) {
    html += `
    <div style="text-align:center;padding:40px 24px;color:var(--paper-faint);">
      <div style="font-size:32px;margin-bottom:12px;">⚖</div>
      <div style="font-size:13px;">Log your first weigh-in above.<br>Chart appears after 2 entries.</div>
    </div>`;
  }

  document.getElementById("weightContent").innerHTML = html;
}

/* ============================================================================
   INIT — load data from Firestore, then open on today's week and day
   ============================================================================ */
(async function init() {
  // Load cloud data first (falls back to localStorage if offline)
  await initStorage();

  const PROGRAM_START = new Date("2026-05-18T00:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);

  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  const weeksSinceStart = Math.floor((today - PROGRAM_START) / msPerWeek) + 1;
  const startWeek = Math.max(1, Math.min(25, weeksSinceStart));

  const jsDow = today.getDay();
  const appDay = jsDow === 0 ? 6 : jsDow - 1;

  document.getElementById("weekInput").value = startWeek;
  currentWeek = startWeek;
  currentDay = appDay;

  document.querySelectorAll(".day-chip").forEach((c, i) => c.classList.toggle("active", i === appDay));

  updateHeaderForWeek(startWeek);
  renderDay(startWeek, appDay);
})();
